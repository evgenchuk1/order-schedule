<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="הזמנות 208">
  <meta name="theme-color" content="#1B4F72">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>לוז הזמנות סחורה — 208 דיל נחל אורה</title>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{
      --blue:#1B4F72;--blue2:#2980B9;
      --green-bg:#EAF3DE;--green-b:#7DBE44;--green-t:#27500A;
      --teal-bg:#E1F5EE;--teal-b:#5DCAA5;--teal-t:#085041;
      --blue-bg:#E6F1FB;--blue-b:#85B7EB;--blue-t:#0C447C;
      --purple-bg:#EEEDFE;--purple-b:#AFA9EC;--purple-t:#26215C;
      --coral-bg:#FAECE7;--coral-b:#F0997B;--coral-t:#4A1B0C;
      --amber-bg:#FAEEDA;--amber-b:#EF9F27;--amber-t:#633806;
      --red-bg:#FCEBEB;--red-b:#F09595;--red-t:#501313;
      --pink-bg:#FBEAF0;--pink-b:#ED93B1;--pink-t:#4B1528;
    }
    html,body{height:100%;overflow:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
      background:#F0F4F8;
      display:flex;flex-direction:column;
      padding-top:env(safe-area-inset-top);
    }

    /* ─── Header ─── */
    .hdr{
      background:linear-gradient(135deg,var(--blue),var(--blue2));
      color:#fff;
      padding:12px 16px 10px;
      display:flex;align-items:center;justify-content:space-between;
      flex-shrink:0;
      box-shadow:0 2px 8px rgba(0,0,0,.25);
      z-index:10;
    }
    .hdr-title{font-size:22px;font-weight:700;line-height:1.2;}
    .hdr-date{font-size:16px;opacity:.8;margin-top:2px;}
    .bell{
      background:rgba(255,255,255,.18);border:none;border-radius:50%;
      width:40px;height:40px;font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s;flex-shrink:0;
    }
    .bell:active{background:rgba(255,255,255,.35);}

    /* ─── Day tabs ─── */
    .tabs{
      display:flex;overflow-x:auto;scrollbar-width:none;
      background:#fff;border-bottom:2px solid #E8EDF2;
      flex-shrink:0;z-index:9;
    }
    .tabs::-webkit-scrollbar{display:none;}
    .tab{
      flex:0 0 auto;padding:13px 18px 11px;
      font-size:20px;font-weight:600;color:#888;cursor:pointer;
      border-bottom:3px solid transparent;white-space:nowrap;
      transition:color .15s;position:relative;user-select:none;
    }
    .tab.active{color:var(--blue);border-bottom-color:var(--blue);}
    .tab.today{color:#C0392B;}
    .tab.today.active{color:#C0392B;border-bottom-color:#C0392B;}
    .badge{
      display:inline-flex;align-items:center;justify-content:center;
      background:#E74C3C;color:#fff;border-radius:11px;
      font-size:14px;min-width:22px;height:22px;padding:0 5px;
      margin-right:4px;vertical-align:middle;font-weight:700;
    }

    /* ─── Scroll area ─── */
    .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .container{padding:14px;max-width:520px;margin:0 auto;}

    /* ─── Progress ─── */
    .prog{
      background:#fff;border-radius:14px;padding:13px 16px;
      margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);
    }
    .prog-label{font-size:16px;color:#888;margin-bottom:7px;display:flex;justify-content:space-between;}
    .prog-bar{height:8px;background:#EDF2F7;border-radius:4px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,#27AE60,#2ECC71);
      border-radius:4px;transition:width .6s ease;will-change:width;}
    .prog-done{margin-top:5px;font-size:16px;color:#27AE60;font-weight:600;}

    /* ─── Order cards ─── */
    .card{
      background:#fff;border-radius:14px;padding:12px 14px;
      margin-bottom:9px;display:flex;align-items:center;gap:11px;
      box-shadow:0 1px 3px rgba(0,0,0,.07);
      border-right:4px solid #ddd;
      transition:opacity .3s,transform .2s;position:relative;
      cursor:default;
    }
    .card.c-green{border-right-color:var(--green-b);}
    .card.c-teal{border-right-color:var(--teal-b);}
    .card.c-blue{border-right-color:var(--blue-b);}
    .card.c-purple{border-right-color:var(--purple-b);}
    .card.c-coral{border-right-color:var(--coral-b);}
    .card.c-amber{border-right-color:var(--amber-b);}
    .card.c-red{border-right-color:var(--red-b);}
    .card.c-pink{border-right-color:var(--pink-b);}

    .card.done{opacity:.42;}
    .card.done .cname{text-decoration:line-through;color:#aaa;}

    .card.urgent:not(.done){
      border-right-color:#E74C3C!important;
      background:#FFF5F5;
      animation:pulseBorder 1.8s infinite;
    }
    .card.warning:not(.done){
      border-right-color:#E67E22!important;
      background:#FFFBF5;
    }
    @keyframes pulseBorder{
      0%{box-shadow:0 1px 3px rgba(231,76,60,.15);}
      50%{box-shadow:0 3px 18px rgba(231,76,60,.45);}
      100%{box-shadow:0 1px 3px rgba(231,76,60,.15);}
    }

    .cicon{font-size:36px;flex-shrink:0;width:42px;text-align:center;}
    .cinfo{flex:1;min-width:0;}
    .cname{font-size:21px;font-weight:600;color:#1a1a2e;line-height:1.3;}
    .cmeta{font-size:16px;color:#999;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

    .dl{
      display:inline-flex;align-items:center;gap:3px;
      border-radius:8px;padding:3px 9px;font-size:16px;font-weight:700;
    }
    .dl.ok{background:#D5F5E3;color:#1E8449;}
    .dl.warn{background:#FDECD0;color:#D35400;}
    .dl.hot{background:#FDEBD0;color:#BA4A00;}
    .dl.over{background:#FDEDEC;color:#C0392B;}

    .chk{
      width:46px;height:46px;border-radius:50%;
      border:2.5px solid #D5D8DC;background:#fff;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:24px;flex-shrink:0;
      transition:background .2s,border-color .2s,transform .15s;
      -webkit-user-select:none;user-select:none;
    }
    .chk:active{transform:scale(.88);}
    .chk.checked{background:#27AE60;border-color:#27AE60;color:#fff;}

    .empty{text-align:center;padding:50px 20px;color:#BCC0C5;font-size:15px;}

    /* ─── Alarm overlay ─── */
    .overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.72);z-index:1000;
      align-items:center;justify-content:center;padding:20px;
    }
    .overlay.on{display:flex;}
    .modal{
      background:#fff;border-radius:22px;padding:26px 22px;
      max-width:340px;width:100%;text-align:center;
      animation:popIn .25s ease;
    }
    @keyframes popIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
    .m-icon{font-size:52px;margin-bottom:10px;}
    .m-title{font-size:26px;font-weight:800;color:#1a1a2e;margin-bottom:5px;}
    .m-sub{font-size:18px;color:#E74C3C;font-weight:600;margin-bottom:16px;}
    .m-items{background:#F8F9FA;border-radius:12px;padding:10px 12px;margin-bottom:18px;text-align:right;}
    .m-item{padding:9px 0;border-bottom:1px solid #EEE;font-size:18px;line-height:1.4;}
    .m-item:last-child{border-bottom:none;}
    .m-item strong{color:#1a1a2e;}
    .m-item small{color:#E74C3C;font-weight:600;}
    .mbtn{
      width:100%;padding:14px;border:none;border-radius:13px;
      font-size:19px;font-weight:700;cursor:pointer;margin-bottom:9px;
      transition:opacity .15s;
    }
    .mbtn:active{opacity:.8;}
    .mbtn-ok{background:#27AE60;color:#fff;}
    .mbtn-snooze{background:#F0F4F8;color:#555;font-size:13px;padding:12px;}

    /* ─── Toast (replaces alert() — blocked in iOS PWA standalone) ─── */
    .toast{
      position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
      background:rgba(20,20,20,.92);color:#fff;padding:13px 22px;
      border-radius:16px;font-size:15px;z-index:3000;
      max-width:88%;text-align:center;line-height:1.5;pointer-events:none;
      animation:toastIn .2s ease;
    }
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

    /* ─── Delivery day badge ─── */
    .dlday{
      display:inline-flex;align-items:center;gap:3px;
      border-radius:8px;padding:3px 9px;font-size:14px;font-weight:600;
      background:#EEF2FF;color:#4338CA;
    }
    .ccat{font-size:14px;color:#777;margin-top:2px;}

    /* ─── Setup tip ─── */
    .tip{
      background:#EAF4FD;border-radius:14px;padding:13px 15px;
      margin-top:6px;margin-bottom:14px;font-size:12px;color:#2471A3;
      border-right:3px solid #2471A3;
    }
    .tip b{display:block;margin-bottom:4px;font-size:13px;}
    .tip ol{padding-right:16px;margin-top:5px;}
    .tip ol li{margin-bottom:3px;}

    /* ─── Warehouse FAB ─── */
    .fab-wh{
      position:fixed;bottom:28px;left:16px;
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,#1B4F72,#2980B9);
      color:#fff;border:none;font-size:22px;
      cursor:pointer;z-index:500;
      box-shadow:0 4px 14px rgba(0,0,0,.3);
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s,box-shadow .15s;
    }
    .fab-wh:active{transform:scale(.9);}

    .wh-drop{
      position:fixed;bottom:90px;left:16px;
      background:#fff;border-radius:16px;
      box-shadow:0 6px 28px rgba(0,0,0,.22);
      min-width:248px;z-index:600;
      overflow:hidden;
      transform-origin:bottom left;
      display:none;
    }
    .wh-drop.open{display:block;animation:dropIn .18s ease;}
    @keyframes dropIn{from{transform:scale(.88);opacity:0;}to{transform:scale(1);opacity:1;}}
    .wh-drop-hdr{
      padding:10px 15px 8px;font-size:13px;color:#888;
      border-bottom:1px solid #F0F4F8;font-weight:700;letter-spacing:.3px;
    }
    .wh-drop-item{
      padding:13px 15px;font-size:16px;cursor:pointer;
      display:flex;align-items:center;gap:9px;
      border-bottom:1px solid #F5F7FA;color:#1a1a2e;
      transition:background .12s;
    }
    .wh-drop-item:last-child{border-bottom:none;}
    .wh-drop-item:active{background:#EBF5FB;}
    .wh-drop-item .wh-num{
      font-weight:800;color:#1B4F72;min-width:36px;
    }

    /* ─── Warehouse schedule modal ─── */
    .wh-overlay{
      display:none;position:fixed;inset:0;
      background:rgba(0,0,0,.68);z-index:1100;
      align-items:center;justify-content:center;padding:14px;
    }
    .wh-overlay.on{display:flex;}
    .wh-modal{
      background:#fff;border-radius:20px;padding:20px 14px 18px;
      max-width:480px;width:100%;max-height:88vh;overflow-y:auto;
      animation:popIn .22s ease;
    }
    .wh-modal-title{
      font-size:19px;font-weight:800;color:#1B4F72;
      margin-bottom:14px;text-align:center;
    }
    .wh-table{width:100%;border-collapse:collapse;font-size:14px;}
    .wh-table th{
      background:#E6F1FB;color:#0C447C;padding:9px 7px;
      text-align:center;font-weight:700;font-size:13px;
    }
    .wh-table td{
      padding:9px 7px;text-align:center;
      border-bottom:1px solid #F0F4F8;color:#333;
    }
    .wh-table tr:last-child td{border-bottom:none;}
    .wh-table tr:nth-child(even) td{background:#FAFCFF;}
    .wh-close{
      width:100%;margin-top:14px;padding:13px;
      border:none;border-radius:13px;
      background:#1B4F72;color:#fff;
      font-size:17px;font-weight:700;cursor:pointer;
    }
    .wh-close:active{opacity:.8;}
  </style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">📋 לוז הזמנות — 208 דיל נחל אורה</div>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="bell" id="testBtn" title="בדוק עכשיו" onclick="testAlarmNow()" style="font-size:15px;background:rgba(231,76,60,.35);">🧪</button>
    <button class="bell" id="bellBtn" title="התראות" onclick="handleBell()">🔔</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="scroll">
  <div class="container" id="container"></div>
</div>

<!-- Alarm modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="m-icon">⏰</div>
    <div class="m-title">תזכורת הזמנה!</div>
    <div class="m-sub" id="mSub"></div>
    <div class="m-items" id="mItems"></div>
    <button class="mbtn mbtn-ok" onclick="doneAlarmItems()">✓ סמן כהוזמן</button>
    <button class="mbtn mbtn-snooze" onclick="snoozeAlarm()">⏱ תזכורת הבאה בעוד 5 דקות</button>
  </div>
</div>

<!-- Warehouse FAB -->
<button class="fab-wh" id="fabWh" onclick="toggleWhDropdown()" title="לוז לפי מרכז הפצה">🏭</button>

<!-- Warehouse dropdown -->
<div class="wh-drop" id="whDrop">
  <div class="wh-drop-hdr">בחר מרכז הפצה</div>
  <div class="wh-drop-item" onclick="showWarehouseSchedule('6000')"><span class="wh-num">6000</span>🏭 ראשון לציון</div>

  <div class="wh-drop-item" onclick="showWarehouseSchedule('6033')"><span class="wh-num">6033</span>❄️ שוהם קפואים</div>
  <div class="wh-drop-item" onclick="showWarehouseSchedule('6047')"><span class="wh-num">6047</span>🌿 לב הארץ</div>
</div>

<!-- Warehouse schedule modal -->
<div class="wh-overlay" id="whOverlay" onclick="closeWhModal()">
  <div class="wh-modal" onclick="event.stopPropagation()">
    <div class="wh-modal-title" id="whModalTitle"></div>
    <table class="wh-table">
      <thead>
        <tr>
          <th>יום הזמנה</th>
          <th>עד שעה</th>
          <th>יום אספקה</th>
          <th>קטגוריות</th>
        </tr>
      </thead>
      <tbody id="whTableBody"></tbody>
    </table>
    <button class="wh-close" onclick="closeWhModal()">סגור ✕</button>
  </div>
</div>

// Persist firedAlarms across page refreshes
function firedAlarmsKey(){
  const d=new Date();
  return `firedAlarms_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
const firedAlarms = new Set(
  (()=>{try{return JSON.parse(localStorage.getItem(firedAlarmsKey())||'[]');}catch{return[];}})()
);
function saveFiredAlarms(){
  try{localStorage.setItem(firedAlarmsKey(),JSON.stringify([...firedAlarms]));}catch(e){}
}
function markFired(key){firedAlarms.add(key);saveFiredAlarms();}

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
function dayKey(){
  const d=new Date();
  return `done_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function getDone(){
  try{return JSON.parse(localStorage.getItem(dayKey())||'{}');}catch{return{};}
}
function setDone(id,v){
  const o=getDone();
  if(v) o[id]=1; else delete o[id];
  localStorage.setItem(dayKey(),JSON.stringify(o));
}
function isDone(id){return !!getDone()[id];}

// ═══════════════════════════════════════════
//  TIME
// ═══════════════════════════════════════════
function toMin(s){if(!s)return null;const[h,m]=s.split(':').map(Number);return h*60+m;}
function nowMin(){const n=new Date();return n.getHours()*60+n.getMinutes();}

// If deadline is early next morning (00:00-03:00) and it's currently evening (after 20:00),
// treat it as next-day time so diff calculations are correct across midnight.
function effectiveDl(dlStr){
  const dl=toMin(dlStr);
  const now=nowMin();
  if(dl<=180 && now>=1200) return dl+1440;
  return dl;
}

function itemStatus(item){
  if(isDone(item.id)) return 'done';
  if(!item.dl) return 'none';
  const d=effectiveDl(item.dl),n=nowMin(),diff=d-n;
  if(diff<0)   return 'over';
  if(diff<=30) return 'hot';
  if(diff<=60) return 'warn';
  return 'ok';
}

}

function renderTabs(){

function dlBadge(item,isToday){
  if(!item.dl) return '';
  const st=isToday?itemStatus(item):'ok';
  if(st==='done') return `<span class="dl ok">✓ ${item.dl}</span>`;
  const labels={ok:'ok',warn:'warn',hot:'hot',over:'over'};
  const icons={ok:'⏱',warn:'⚠️',hot:'🔴',over:'🚨'};
  const prefixes={ok:'עד ',warn:'עד ',hot:'עד ',over:'עבר! '};
  const cls=labels[st]||'ok';
  return `<span class="dl ${cls}">${icons[st]} ${prefixes[st]}${item.dl}</span>`;
}

function renderOrders(){
  const today=new Date().getDay();
  const isToday=VIEW_DAY===today;

  if(items.length===0){
    el.innerHTML='<div class="empty">🕌<br>אין הזמנות ביום זה</div>';
    return;
  }

  let html='';

  // Progress bar (today only)
  if(isToday){
    const withDl=items.filter(x=>x.dl);
    const doneDl=withDl.filter(x=>isDone(x.id));
    const pct=withDl.length?Math.round(doneDl.length/withDl.length*100):0;
    html+=`<div class="prog">
      <div class="prog-label"><span>התקדמות היום</span><span>${doneDl.length}/${withDl.length}</span></div>

    </div>`;
  }

  // Cards — pending first, done at bottom
  const sorted=[...items].sort((a,b)=>{
    const da=isDone(a.id)?1:0,db=isDone(b.id)?1:0;
    return da-db;
  });

  for(const item of sorted){

  if(isToday && !localStorage.getItem('tipDismissed')){

    </div>`;

function unlockAudio(){
  if(audioUnlocked){
    // Resume if iOS suspended the context after backgrounding
    if(audioCtx && audioCtx.state==='suspended') audioCtx.resume();
    return;
  }
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const buf=audioCtx.createBuffer(1,1,22050);
    const src=audioCtx.createBufferSource();
    src.buffer=buf;src.connect(audioCtx.destination);src.start();
    audioUnlocked=true;
  }catch(e){}
}

function beep(freq,dur,type='sine',vol=0.28){
  if(!audioCtx) return;
  try{
    const osc=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    osc.connect(g);g.connect(audioCtx.destination);
    osc.type=type;osc.frequency.value=freq;
    const t=audioCtx.currentTime;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    osc.start(t);osc.stop(t+dur);
  }catch(e){}
}

function playTick(){
  beep(880,.12,'sine',.22);
  setTimeout(()=>beep(1100,.12,'sine',.22),120);
}

function playAlarm(){
  if(!audioCtx) return;
  if(audioCtx.state==='suspended'){
    audioCtx.resume().then(()=>playAlarm());
    return;
  }
  const ctx=audioCtx, t=ctx.currentTime;

  // 1. ominous low drone
  const drone=ctx.createOscillator();
  const dg=ctx.createGain();
  drone.type='sawtooth';
  drone.frequency.setValueAtTime(55,t);
  drone.frequency.exponentialRampToValueAtTime(95,t+0.7);
  dg.gain.setValueAtTime(0,t);
  dg.gain.linearRampToValueAtTime(0.38,t+0.08);
  dg.gain.exponentialRampToValueAtTime(0.001,t+0.9);
  drone.connect(dg);dg.connect(ctx.destination);
  drone.start(t);drone.stop(t+0.9);

  // 2. rapid sharp stabs
  [0.25,0.38,0.52,0.66].forEach((d,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='square';
    o.frequency.value=1300+i*250;
    g.gain.setValueAtTime(0.5,t+d);
    g.gain.exponentialRampToValueAtTime(0.001,t+d+0.11);
    o.connect(g);g.connect(ctx.destination);
    o.start(t+d);o.stop(t+d+0.13);
  });

  // 3. rising horror siren
  const siren=ctx.createOscillator();
  const sg=ctx.createGain();
  siren.type='sine';
  siren.frequency.setValueAtTime(180,t+0.85);
  siren.frequency.exponentialRampToValueAtTime(1400,t+1.9);
  sg.gain.setValueAtTime(0.38,t+0.85);
  sg.gain.exponentialRampToValueAtTime(0.001,t+2.1);
  siren.connect(sg);sg.connect(ctx.destination);
  siren.start(t+0.85);siren.stop(t+2.1);
}

function vibrate(pattern){
  try{if(navigator.vibrate) navigator.vibrate(pattern);}catch(e){}
}

function startAlarmLoop(){
  stopAlarmLoop();
  vibrate([400,150,400,150,800,150,800]);
  playAlarm();
  alarmLoopId=setInterval(()=>{
    vibrate([400,150,400,150,800]);
    playAlarm();
  },3200);
}
function stopAlarmLoop(){
  if(alarmLoopId){clearInterval(alarmLoopId);alarmLoopId=null;}
  try{if(navigator.vibrate) navigator.vibrate(0);}catch(e){}
}

// ═══════════════════════════════════════════
//  ALARM TRIGGER LOGIC
// ═══════════════════════════════════════════
// Reminder offsets in minutes before deadline (positive = before, 0 = at, negative = after)
const REMIND_AT=[40,35,30,25,20,15,10,5,0]; // first alert 40 min before, then every 5 min until deadline

function checkTriggers(){
  const today=new Date().getDay();
  const items=SCH[today]||[];
  const n=nowMin();
  const toFire=[];

  for(const item of items){
    if(isDone(item.id)||!item.dl) continue;
    const dl=effectiveDl(item.dl);
    const diff=dl-n;

    // Widen window to 2 min to survive interval drift
    for(const offset of REMIND_AT){
      const key=`${item.id}:${offset}`;
      if(!firedAlarms.has(key)&&diff<=offset&&diff>offset-2){
        markFired(key);
        toFire.push(item);
        break;
      }
    }

    // After deadline: fire every 5 min until done
    if(diff<0){
      const minsOver=Math.abs(diff);
      const slot=Math.floor(minsOver/5);
      const key=`${item.id}:over${slot}`;
      if(!firedAlarms.has(key)){
        markFired(key);
        toFire.push(item);
      }
    }
  }

  const seen=new Set();
  const unique=toFire.filter(x=>{if(seen.has(x.id))return false;seen.add(x.id);return true;});
  if(unique.length>0) showAlarm(unique);
}

// Check for missed/upcoming reminders when app first opens
function checkMissed(){
  const today=new Date().getDay();
  const items=SCH[today]||[];
  const n=nowMin();
  const toFire=[];

  for(const item of items){
    if(isDone(item.id)||!item.dl) continue;
    const dl=effectiveDl(item.dl);
    const diff=dl-n;

    // Mark all passed REMIND_AT points as fired, fire the first unhandled one
    let fired=false;
    for(const offset of REMIND_AT){
      const key=`${item.id}:${offset}`;
      if(diff<=offset){
        if(!firedAlarms.has(key)&&!fired){
          markFired(key);
          toFire.push(item);
          fired=true;
        } else {
          markFired(key); // mark older offsets silently
        }
      }
    }

    // Past deadline
    if(diff<0){
      const minsOver=Math.abs(diff);
      const slot=Math.floor(minsOver/5);
      const key=`${item.id}:over${slot}`;
      if(!firedAlarms.has(key)){
        markFired(key);
        if(!fired){toFire.push(item);fired=true;}
      }
    }
  }

  const seen=new Set();
  const unique=toFire.filter(x=>{if(seen.has(x.id))return false;seen.add(x.id);return true;});
  if(unique.length>0) showAlarm(unique);
}

// ═══════════════════════════════════════════
//  ALARM MODAL
// ═══════════════════════════════════════════
function showAlarm(items){
  alarmItems=items;
  unlockAudio();

  const n=nowMin();
  const hasOver=items.some(x=>toMin(x.dl)<n);
  document.getElementById('mSub').textContent=hasOver?'הגיע ועבר מועד ההזמנה!':'הגיע זמן לבצע הזמנה!';

  document.getElementById('mItems').innerHTML=items.map(item=>{
    const diff=toMin(item.dl)-n;
    const timeStr=diff<0
      ?`<small>⚠️ איחור של ${Math.abs(diff)} דקות!</small>`
      :`<small>⏱ נותרו ${diff} דקות (עד ${item.dl})</small>`;
    const dayStr=item.dlDay?`<small style="color:#4338CA">📦 אספקה: ${item.dlDay}</small>`:'' ;
    return `<div class="m-item"><strong>${item.ic} ${item.nm}</strong><br>${timeStr}${dayStr?'&nbsp;&nbsp;'+dayStr:''}</div>`;
  }).join('');

  document.getElementById('overlay').classList.add('on');
  startAlarmLoop();

  // Browser notification
  if(Notification&&Notification.permission==='granted'){
    const names=items.map(x=>x.nm).join(' · ');
    try{
      new Notification('הזמנות סחורה ⏰',{
        body:`יש להזמין: ${names}`,
        icon:'icon-192.png',tag:'order',requireInteraction:true,
        vibrate:[200,100,200,100,400],
      });
    }catch(e){}
  }
}

function doneAlarmItems(){
  unlockAudio();
  alarmItems.forEach(x=>setDone(x.id,true));
  dismissAlarm();
  render();
}

function snoozeAlarm(){
  dismissAlarm();
  if(snoozeId) clearTimeout(snoozeId);
  snoozeId=setTimeout(()=>showAlarm(alarmItems.filter(x=>!isDone(x.id))),5*60*1000);
}

function dismissAlarm(){
  document.getElementById('overlay').classList.remove('on');
  stopAlarmLoop();
}

async function tryOneSignalOptIn(){
  const log = [];
  try{
    log.push('OS:'+(window.OneSignal?'ok':'missing'));
    if(!window.OneSignal){ showToast('⚠️ OneSignal SDK לא נטען',4000); return; }

    log.push('perm:'+Notification.permission);
    log.push('optedIn:'+(OneSignal.User?.PushSubscription?.optedIn));

    if(!OneSignal.User?.PushSubscription?.optedIn){
      if(Notification.permission!=='granted'){
        log.push('requestPerm...');
        await OneSignal.Notifications.requestPermission();
        log.push('perm_after:'+Notification.permission);
      }
      log.push('optIn()...');
      await OneSignal.User.PushSubscription.optIn();
      log.push('optIn_done');
    }
    log.push('optedIn_final:'+(OneSignal.User?.PushSubscription?.optedIn));
  }catch(e){
    log.push('ERR:'+e.message);
    showToast('❌ שגיאה: '+e.message, 6000);
  }
  showToast('🔔 '+log.join(' | '), 7000);
  await new Promise(r=>setTimeout(r,800));
  syncBellIcon();
}

async function handleBell() {
  unlockAudio();

  if(!('Notification' in window)){
    showToast('⚠️ הדפדפן לא תומך בהתראות — התקן כ-PWA דרך Safari');
    return;
  }

  if(Notification.permission==='denied'){
    showToast('⚠️ חסום ← הגדרות → הזמנות → התראות → אפשר', 5000);
    return;
  }

  if(Notification.permission==='default'){
    const p=await Notification.requestPermission();
    if(p==='granted'){
      await tryOneSignalOptIn();
    } else {
      showToast('❌ ההרשאה נדחתה');
    }
    return;
  }

  // Already granted
  await tryOneSignalOptIn();
}

function toggleWhDropdown(){
  document.getElementById('whDrop').classList.toggle('open');
}

function showWarehouseSchedule(code){
  document.getElementById('whDrop').classList.remove('open');
  const wh=WH_DATA[code];
  if(!wh) return;
  document.getElementById('whModalTitle').textContent=wh.icon+' '+wh.name;
  document.getElementById('whTableBody').innerHTML=wh.rows.map(r=>`
    <tr>
      <td><strong>${r.od}</strong></td>
      <td style="color:#27AE60;font-weight:700">⏱ ${r.ot}</td>
      <td style="color:#4338CA;font-weight:600">📦 ${r.dd}</td>
      <td style="text-align:right;font-size:13px;color:#555">${r.cat}</td>
    </tr>`).join('');
  document.getElementById('whOverlay').classList.add('on');
}

function closeWhModal(){
  document.getElementById('whOverlay').classList.remove('on');
}

document.addEventListener('click',function(e){
  const fab=document.getElementById('fabWh');
  const drop=document.getElementById('whDrop');
  if(!drop.classList.contains('open')) return;
  if(!fab.contains(e.target)&&!drop.contains(e.target)){
    drop.classList.remove('open');
  }
});
</script>
