name: 📦 הזמנות — תזכורות

on:
  # Every 10 min, Sun–Thu, 05:00–16:00 UTC = 08:00–19:00 Israel (UTC+3 summer)
  schedule:
    - cron: '*/10 5-16 * * 0,1,2,3,4'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send order push notifications
        env:
          ONESIGNAL_APP_ID: 'acf60cd7-d10c-49d7-a379-e0d833299bd4'
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: python3 .github/scripts/notify.py
