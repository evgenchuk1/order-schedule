name: 📦 הזמנות — תזכורות

on:
  # Every 5 min, Sun–Thu + Sat (test), 05:00–21:00 UTC = 08:00–00:00 Israel (UTC+3 summer)
  schedule:
    - cron: '*/5 5-21 * * 0,1,2,3,4,6'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send order push notifications
        run: python3 .github/scripts/notify.py
