name: 📦 הזמנות — תזכורות

on:
  # Schedule disabled — runs via Windows Task Scheduler for reliable 5-min intervals.
  # GitHub Actions cron is not precise enough (delays up to 30-60 min).
  # Uncomment below to re-enable as backup:
  # schedule:
  #   - cron: '*/5 5-21 * * 0,1,2,3,4,6'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send order push notifications
        run: python3 .github/scripts/notify.py
