name: ☀️ Morning summary + hourly reminders

on:
  # Israel summer = UTC+3  (March-October)
  # Israel winter = UTC+2  (November-February)
  # Jobs scheduled for IL summer (UTC+3); in winter they arrive 1h earlier — acceptable.
  schedule:
    - cron: '28 3 * * 0,1,2,3,4'   # 06:28 IL → morning summary
    - cron: '28 4 * * 0,1,2,3,4'   # 07:28 IL → hourly reminder
    - cron: '28 5 * * 0,1,2,3,4'   # 08:28 IL
    - cron: '28 6 * * 0,1,2,3,4'   # 09:28 IL
    - cron: '28 7 * * 0,1,2,3,4'   # 10:28 IL
    - cron: '28 8 * * 0,1,2,3,4'   # 11:28 IL
    - cron: '28 9 * * 0,1,2,3,4'   # 12:28 IL
    - cron: '28 10 * * 0,1,2,3,4'  # 13:28 IL
  workflow_dispatch: {}   # allow manual trigger for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cloud notifier
        run: python3 .github/scripts/notify_cloud.py
