name: ☀️ Morning summary (orders)

on:
  # Israel summer = UTC+3  (March-October)
  # Israel winter = UTC+2  (November-February)
  # Job scheduled for IL summer (UTC+3); in winter it arrives 1h earlier — acceptable.
  # Cloud-only backup for the 06:30 morning summary in case the PC is off —
  # 15-min-precision proximity reminders need Task Scheduler, see notify.py.
  schedule:
    - cron: '28 3 * * 0,1,2,3,4,5'   # 06:28 IL → morning summary (Sun-Fri; Fri has 1 order)
  workflow_dispatch: {}   # allow manual trigger for testing

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cloud notifier
        run: python3 .github/scripts/notify_cloud.py
